services:
  mariadb:
    container_name: mariadb
    build:
      context: ./requirements/mariadb
    image: mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: always
    networks:
      - manualvanet
    env_file:
      - .env

networks:
  manualvanet:
    name: manualvanet
    driver: bridge

volumes:
  mariadb_data: