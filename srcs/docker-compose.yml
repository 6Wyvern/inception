services:
  mariadb:
    container_name: mariadb
    build:
      context: ./requirements/mariadb
    image: mariadb
    volumes:
      - /home/manualva/data/mariadb:/var/lib/mysql
    restart: always
    networks:
      - manualvanet
    env_file:
      - .env

  wordpress:
    container_name: wordpress
    build:
      context: ./requirements/wordpress
    image: wordpress
    depends_on:
      - mariadb
    volumes:
      - /home/manualva/data/wordpress:/var/www/html
    restart: always
    env_file:
      - .env
    networks:
      - manualvanet

  nginx:
    container_name: nginx
    build:
      context: ./requirements/nginx
    image: nginx
    depends_on:
      - wordpress
    volumes:
      - /home/manualva/data/wordpress:/var/www/html
    ports:
      - "443:443"
    restart: always
    env_file:
      - .env
    networks:
      - manualvanet

networks:
  manualvanet:
    name: manualvanet
    driver: bridge